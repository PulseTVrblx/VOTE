<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VexVision 2026 — Austria National Final</title>
    <style>
        :root {
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.65);
            --vex-gold: #ffcc00;
            --success-green: #00ffaa;
            
            /* Edler, cleaner Glas-Morphismus ohne fehlerhafte Effekte */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.18);
            --card-glow: 0px 35px 70px rgba(0, 0, 0, 0.6), 0px 0px 45px -15px rgba(255, 204, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* National Final Arena-Hintergrund (Tiefes Anthrazit, Gold & Bühnen-Blau) */
            background: 
                radial-gradient(circle at 85% 85%, rgba(255, 204, 0, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 15% 20%, rgba(0, 102, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(35, 30, 45, 0.8) 0%, transparent 80%),
                linear-gradient(145deg, #07060a 0%, #121018 40%, #1c1624 75%, #2a1f35 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* Navigationsleiste */
        .nav-bar {
            width: calc(100% - 48px);
            max-width: 1100px;
            height: 54px;
            margin-top: 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 27px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            font-size: 13px;
            font-weight: 500;
        }

        .lang-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }
        
        .lang-selector option {
            background: #14121a;
            color: #fff;
        }

        .nav-center {
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 11px;
            color: var(--vex-gold);
        }

        .nav-menu-icon {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 16px;
        }
        .nav-menu-icon span {
            display: block;
            height: 2px;
            background: white;
            width: 100%;
            border-radius: 1px;
        }

        /* Haupt-Layout */
        .viewport-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto 0;
            padding: 40px 24px 0 24px;
            width: 100%;
            max-width: 480px;
        }

        /* Arena Glassmorphism Card */
        .clean-glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(140%);
            -webkit-backdrop-filter: blur(30px) saturate(140%);
            border: 1.5px solid var(--glass-border);
            border-radius: 36px; 
            box-shadow: var(--card-glow);
            width: 100%;
            height: 420px;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            margin-bottom: 35px;
        }

        /* Live Suchfeld */
        .search-container {
            margin-bottom: 16px;
        }

        .search-bar {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 12px 16px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-bar:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--vex-gold);
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        /* Scrollbereich */
        .options-scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }

        .options-scroll-area::-webkit-scrollbar {
            width: 6px;
        }
        .options-scroll-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
        }

        /* Zeilen der Votings */
        .vote-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .vote-row:hover {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Radio Buttons */
        .vote-row input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            position: absolute;
            right: 18px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .vote-row input[type="radio"]:checked {
            border-color: var(--vex-gold);
            background: var(--vex-gold);
            box-shadow: inset 0 0 0 4px #121018;
        }

        .vote-row.selected {
            border-color: var(--vex-gold);
            background: rgba(255, 255, 255, 0.1);
        }

        .iso-code {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.45);
            width: 38px;
            letter-spacing: 0.5px;
        }

        .country-name {
            font-size: 16px;
            font-weight: 600;
        }

        .no-results {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 40px;
        }

        /* Typografie & Meta-Beschreibungen */
        .headline {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
            margin-bottom: 8px;
            line-height: 1.25;
        }

        .location-badge {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--vex-gold);
            margin-bottom: 16px;
            opacity: 0.85;
        }

        .body-narrative {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
            max-width: 440px;
            margin-bottom: 30px;
        }

        /* Sende-Button */
        .submit-btn {
            background: #ffffff;
            color: #07060a;
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            max-width: 320px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--vex-gold);
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.2);
            box-shadow: none;
            cursor: not-allowed;
        }

        #realtime-monitor {
            margin-top: 18px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>

    let activeLang = "de";
    let currentSelectedISO = "";

    function buildCountryList() {
        const stack = document.getElementById("scrollStack");
        const query = document.getElementById("searchBar").value.toLowerCase();
        stack.innerHTML = "";

        // Filtert basierend auf den übersetzten Namen der aktiven Sprache
        const filtered = countryDatabase.filter(item => {
            const localizedName = item.translations[activeLang] || item.translations['en'];
            return localizedName.toLowerCase().includes(query);
        });

        if (filtered.length === 0) {
            stack.innerHTML = `<div class="no-results">${dictionary[activeLang].noResults}</div>`;
            return;
        }

        filtered.forEach(item => {
            const localizedName = item.translations[activeLang] || item.translations['en'];
            const isSelected = item.code === currentSelectedISO;
            const row = document.createElement("label");
            row.className = `vote-row ${isSelected ? 'selected' : ''}`;
            row.onclick = () => selectRow(row, item.code, localizedName);

            row.innerHTML = `
                <span class="iso-code">${item.code}</span>
                <span class="country-name">${localizedName}</span>
                <input type="radio" name="esc" value="${item.code}" ${isSelected ? 'checked' : ''}>
            `;
            stack.appendChild(row);
        });
    }

    function filterCountries() {
        buildCountryList();
    }

    function selectRow(element, isoCode, localizedName) {
        document.querySelectorAll('.vote-row').forEach(row => row.classList.remove('selected'));
        element.classList.add('selected');
        
        const radio = element.querySelector('input[type="radio"]');
        radio.checked = true;
        currentSelectedISO = isoCode;

        document.getElementById('ctaBtn').disabled = false;
        document.getElementById('realtime-monitor').innerText = `${dictionary[activeLang].ready}${localizedName}`;
    }

    function switchLanguage(langKey) {
        activeLang = langKey;
        const data = dictionary[langKey];
        
        document.getElementById("uiHeadline").innerText = data.headline;
        document.getElementById("uiBody").innerText = data.body;
        document.getElementById("searchBar").placeholder = data.searchPlaceholder;
        document.getElementById("ctaBtn").innerText = data.cta;
        
        if(!currentSelectedISO) {
            document.getElementById("realtime-monitor").innerText = data.initialStatus;
        } else {
            const targetItem = countryDatabase.find(c => c.code === currentSelectedISO);
            const currentName = targetItem ? targetItem.translations[activeLang] : currentSelectedISO;
            document.getElementById("realtime-monitor").innerText = `${data.ready}${currentName}`;
        }
        buildCountryList();
    }

    async function initiateTransmission() {
        const monitor = document.getElementById('realtime-monitor');
        const ctaBtn = document.getElementById('ctaBtn');

        if (!currentSelectedISO) return;
        const targetItem = countryDatabase.find(c => c.code === currentSelectedISO);
        const nameToSubmit = targetItem ? targetItem.translations['en'] : currentSelectedISO;
        
        ctaBtn.disabled = true;
        monitor.innerText = dictionary[activeLang].locating;

        if (!navigator.geolocation) {
            transmitPayload(nameToSubmit, "Unknown Location (API Unsupported)");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                monitor.innerText = dictionary[activeLang].resolving;

                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const parsed = await res.json();
                    const region = parsed.address && parsed.address.country ? parsed.address.country : "Unknown Region";
                    
                    monitor.innerText = dictionary[activeLang].sending;
                    transmitPayload(nameToSubmit, region);
                } catch (e) {
                    transmitPayload(nameToSubmit, `Coords: ${lat.toFixed(2)}, ${lon.toFixed(2)}`);
                }
            },
            (err) => {
                transmitPayload(nameToSubmit, "Anonymous Location (Denied)");
            }
        );
    }

    async function transmitPayload(voteSelection, verifiedOrigin) {
        const monitor = document.getElementById('realtime-monitor');
        const ctaBtn = document.getElementById('ctaBtn');
        
        const messageBody = {
            embeds: [{
                title: "🗳️ VexVision 2026 Ballot Registered",
                color: 16763904, 
                fields: [
                    { name: "Voted For (Standard)", value: `**${voteSelection}**`, inline: true },
                    { name: "Voter Origin", value: `🌍 ${verifiedOrigin}`, inline: true }
                ],
                footer: { text: "VexVision Production Hub • Wiener Stadthalle" },
                timestamp: new Date().toISOString()
            }]
        };

        try {
            const delivery = await fetch(discordEndpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(messageBody)
            });

            if (delivery.ok) {
                monitor.innerText = dictionary[activeLang].success;
                monitor.style.color = "var(--success-green)";
                document.getElementById('cardFrame').style.setProperty('--card-glow', '0px 35px 70px rgba(0, 0, 0, 0.6), 0px 0px 45px -15px rgba(0, 255, 170, 0.5)');
            } else {
                monitor.innerText = dictionary[activeLang].fail;
                monitor.style.color = "#ff4d4d";
                ctaBtn.disabled = false;
            }
        } catch (networkError) {
            monitor.innerText = dictionary[activeLang].networkError;
            monitor.style.color = "#ff4d4d";
            ctaBtn.disabled = false;
        }
    }

    // Initiale Generierung beim Laden der App
    document.getElementById("langSelector").value = "de";
    buildCountryList();
</script>
